<div class="flex flex-row flex-wrap md:gap-4 items-start md:items-center justify-start md:justify-between max-md:divide-y divide-foreground border-b border-foreground mx-1.5">
    <div id="logo" class="max-md:w-full md:grow py-1">
        <a href="/" class="font-semibold! text-body"><img src="/favicons/favicon.svg" width="18" class="mt-[-0.25rem] inline-block mr-0.5">{{ site.Title }}</a>
    </div>
    <nav id="menu" class="navlink max-md:w-full flex flex-row flex-wrap items-center gap-x-1.5 gap-y-0.5 justify-start md:justify-end py-1">
        <!-- SECTIONS -->
        {{ range .Site.Home.Sections.ByTitle }}
            <a href="{{ .RelPermalink }}" class="{{ if or (eq . $) (and .IsSection (hasPrefix $.RelPermalink .RelPermalink)) }}current{{ end }}">{{ .Params.menu_title | default .Title }}</a>
        {{ end }}

        <!-- AUTHORS (taxonomy) -->
        <a href="/authors" class="{{ if or (eq .RelPermalink "/authors/") (hasPrefix .RelPermalink "/authors/") }}current{{ end }}">Authors</a>

        <!-- ABOUT -->
        <a href="/about" class="{{ if or (eq .RelPermalink "/about/") (hasPrefix .RelPermalink "/about/") }}current{{ end }}">About</a>
    </nav>
</div>
